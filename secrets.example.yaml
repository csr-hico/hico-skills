# Template for secrets.enc.yaml. These values are infra-revealing and MUST live ONLY in the
# SOPS-encrypted secrets.enc.yaml (or be set directly as Coolify env vars) - never in plaintext
# in the shared repo. Placeholders below use example.tld.
#
# To create the real, encrypted file:
#   cp secrets.example.yaml secrets.enc.yaml   # fill in real values
#   sops -e -i secrets.enc.yaml                # encrypt in place (uses .sops.yaml)
#
# v1 has no classic secret (the OIDC client is public + PKCE, no client_secret); this file is
# about hiding infrastructure identifiers, not passwords.

APP_DOMAIN: hico-skills.example.tld
OIDC_ISSUER: https://login.example.tld/application/o/hico-skills-mcp/
OIDC_JWKS_URI: https://login.example.tld/application/o/hico-skills-mcp/jwks/
OIDC_AUDIENCE: REPLACE_WITH_CLIENT_ID
OIDC_CLIENT_ID: REPLACE_WITH_CLIENT_ID
MCP_REQUIRED_GROUP: HICO
PUBLIC_BASE_URL: https://hico-skills.example.tld
